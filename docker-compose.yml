services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ianus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ianus_dev}
      POSTGRES_DB: ${POSTGRES_DB:-ianus}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
